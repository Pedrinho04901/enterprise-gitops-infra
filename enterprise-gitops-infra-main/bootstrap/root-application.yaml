apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-platform-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/Pedrinho04901/enterprise-gitops-infra.git'
    targetRevision: HEAD
    path: platform-apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: core-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true