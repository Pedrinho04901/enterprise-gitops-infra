apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-v1
  namespace: core-services
  labels:
    app: payment-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
      version: v1
  template:
    metadata:
      labels:
        app: payment-service
        version: v1
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: app
        image: nginxdemos/hello:plain
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 5