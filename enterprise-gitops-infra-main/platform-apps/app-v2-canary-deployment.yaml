apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-v2
  namespace: core-services
  labels:
    app: payment-service
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
      version: v2
  template:
    metadata:
      labels:
        app: payment-service
        version: v2
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: app
        image: nginxdemos/hello:plain-text
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"