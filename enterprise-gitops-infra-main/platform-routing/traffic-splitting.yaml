apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: payment-service-subsets
  namespace: core-services
spec:
  host: payment-service-svc
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
  subsets:
  - name: stable
    labels:
      version: v1
  - name: canary
    labels:
      version: v2
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: payment-traffic-director
  namespace: core-services
spec:
  hosts:
  - "api.enterprise.com"
  gateways:
  - enterprise-gateway
  http:
  - route:
    - destination:
        host: payment-service-svc
        subset: stable
      weight: 90
    - destination:
        host: payment-service-svc
        subset: canary
      weight: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service-svc
  namespace: core-services
spec:
  ports:
  - name: http
    port: 80
    targetPort: 80
  selector:
    app: payment-service